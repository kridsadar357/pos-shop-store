services:
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-posadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pospassword}
      POSTGRES_DB: ${DB_NAME:-posdb}
    ports:
      # Host port is configurable via DB_PORT to avoid conflicts; container stays 5432.
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-posadmin} -d ${DB_NAME:-posdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pos_pgdata:
    name: pos_pgdata
